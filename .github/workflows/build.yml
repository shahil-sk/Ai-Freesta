name: Build Ai Freesta

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxkbcommon-x11-0 \
            libgl1 \
            libegl1 \
            libxcb-cursor0 \
            libdbus-1-3 \
            libfontconfig1 \
            libxrender1 \
            libxcb-glx0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PySide6==6.6.1
          pip install PySide6-WebEngine==6.6.1
          pip install pyinstaller>=6.0.0

      - name: Resolve main application file
        run: |
          if [ -f "ai_freesta.py" ]; then
            echo "ai_freesta.py found"
          elif [ -f "main.py" ]; then
            cp main.py ai_freesta.py
            echo "Copied main.py to ai_freesta.py"
          elif [ -f "app.py" ]; then
            cp app.py ai_freesta.py
            echo "Copied app.py to ai_freesta.py"
          else
            echo "No main Python file found!"
            ls -la *.py || echo "No Python files in directory"
            exit 1
          fi

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm \
            --name ai_freesta \
            --windowed \
            --noconfirm \
            --hidden-import PySide6.QtWebEngineCore \
            --hidden-import PySide6.QtWebEngineWidgets \
            --hidden-import PySide6.QtWebChannel \
            --hidden-import PySide6.QtPrintSupport \
            --hidden-import PySide6.QtWebEngineQuick \
            ai_freesta.py

      - name: Verify build output
        run: |
          ls -lah dist/ai_freesta/
          file dist/ai_freesta/ai_freesta

      - name: Create archive
        run: |
          cd dist
          tar -czf ai-freesta-linux-x64.tar.gz ai_freesta/
          ls -lh ai-freesta-linux-x64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-freesta-linux
          path: dist/ai-freesta-linux-x64.tar.gz
          retention-days: 30
          if-no-files-found: error

      - name: Create release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/ai-freesta-linux-x64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PySide6==6.6.1
          pip install PySide6-WebEngine==6.6.1
          pip install pyinstaller>=6.0.0

      - name: Resolve main application file
        shell: bash
        run: |
          if [ -f "ai_freesta.py" ]; then
            echo "ai_freesta.py found"
          elif [ -f "main.py" ]; then
            cp main.py ai_freesta.py
            echo "Copied main.py to ai_freesta.py"
          elif [ -f "app.py" ]; then
            cp app.py ai_freesta.py
            echo "Copied app.py to ai_freesta.py"
          else
            echo "No main Python file found!"
            ls -la *.py || echo "No Python files in directory"
            exit 1
          fi

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm `
            --name ai_freesta `
            --windowed `
            --noconfirm `
            --hidden-import PySide6.QtWebEngineCore `
            --hidden-import PySide6.QtWebEngineWidgets `
            --hidden-import PySide6.QtWebChannel `
            --hidden-import PySide6.QtPrintSupport `
            --hidden-import PySide6.QtWebEngineQuick `
            ai_freesta.py

      - name: Verify build output
        shell: powershell
        run: |
          Get-ChildItem -Path dist\ai_freesta\ | Select-Object Name, Length
          Test-Path dist\ai_freesta\ai_freesta.exe

      - name: Create archive
        shell: powershell
        run: |
          cd dist
          Compress-Archive -Path ai_freesta -DestinationPath ai-freesta-windows-x64.zip -CompressionLevel Optimal
          Get-ChildItem *.zip | Select-Object Name, @{Name="Size";Expression={"{0:N2} MB" -f ($_.Length / 1MB)}}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-freesta-windows
          path: dist/ai-freesta-windows-x64.zip
          retention-days: 30
          if-no-files-found: error

      - name: Create release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/ai-freesta-windows-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Ai Freesta Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Linux**: ${{ needs.build-linux.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Windows**: ${{ needs.build-windows.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the **Artifacts** section to download builds." >> $GITHUB_STEP_SUMMARY
